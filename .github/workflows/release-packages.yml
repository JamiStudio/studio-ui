name: Release packages

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish packages to npm. Keep false for readiness checks."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.16.0"
          registry-url: "https://registry.npmjs.org"
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm release:packages:check
      - name: Pack package contents
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-packs
          for pkg in packages/tokens packages/registry packages/renderer packages/cli packages/ui; do
            (cd "$pkg" && npm pack --pack-destination "$GITHUB_WORKSPACE/release-packs")
          done
      - name: Attest package tarballs
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "release-packs/*.tgz"
      - name: Publish packages
        if: ${{ inputs.publish == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          for pkg in packages/tokens packages/registry packages/renderer packages/cli packages/ui; do
            (cd "$pkg" && npm publish --provenance --access public)
          done
